services:
  - type: web
    name: whatsapp-chat-analyser
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn app:app --bind 0.0.0.0:$PORT --workers 1 --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: GEMINI_API_KEY
        fromService:
          type: env
          property: GEMINI_API_KEY
      - key: SECRET_KEY
        fromService:
          type: env
          property: SECRET_KEY
